title: Backup Job Deletion Activity Prior to Ransomware Deployment
id: 2d7a5f8b-c349-4b1e-9f83-e1d74bc9a015
status: experimental
description: >
    Detects deletion of Windows Server Backup jobs or backup catalog entries using
    wbadmin.exe. During the Lynx ransomware intrusion, the threat actor connected to
    backup servers via RDP and deleted existing backup jobs before deploying ransomware,
    ensuring no recovery path remained. This rule looks for wbadmin delete operations
    which are rarely used in normal operations and are a common pre-ransomware step.
    Should be correlated with other ransomware precursor behaviors for higher confidence.
references:
    - https://thedfirreport.com/2025/12/17/cats-got-your-files-lynx-ransomware/
    - https://lolbas-project.github.io/lolbas/Binaries/Wbadmin/
author: FourCore Internship Task
date: 2025-12-20
tags:
    - attack.impact
    - attack.t1490
    - attack.defense_evasion
logsource:
    product: windows
    category: process_creation
detection:
    selection_wbadmin_delete:
        Image|endswith: '\wbadmin.exe'
        CommandLine|contains:
            - 'delete catalog'
            - 'delete backup'
            - 'delete systemstatebackup'
            - 'delete systemstaterecovery'
    selection_vssadmin_delete:
        Image|endswith: '\vssadmin.exe'
        CommandLine|contains:
            - 'delete shadows'
    selection_bcdedit_recovery:
        Image|endswith: '\bcdedit.exe'
        CommandLine|contains:
            - 'recoveryenabled no'
            - 'bootstatuspolicy ignoreallfailures'
    condition: selection_wbadmin_delete or selection_vssadmin_delete or selection_bcdedit_recovery
fields:
    - Image
    - CommandLine
    - User
    - ParentImage
    - ComputerName
    - UtcTime
falsepositives:
    - Authorized backup rotation scripts that delete old backup sets to free disk space
    - Backup management software (Veeam, Commvault, etc.) that manages its own backup lifecycle and may invoke wbadmin or vssadmin internally
    - Scheduled tasks for Windows Server Backup maintenance
level: high
