title: SoftPerfect NetScan SMB Write Probe - delete.me File Creation on Network Shares
id: a3f82c1d-94b7-4e2f-b561-0dc3e8a77f41
status: experimental

description: >
    Detects the creation of a file named 'delete.me' on network shares, which is a
    known behavior of SoftPerfect Network Scanner when it is configured to test write
    access on discovered SMB shares. This file is created and then deleted as part of
    the share write-access enumeration feature. Observed during the Lynx ransomware
    intrusion (DFIR Report, December 2025).

references:
    - https://thedfirreport.com/2025/12/17/cats-got-your-files-lynx-ransomware/
    - https://www.softperfect.com/products/networkscanner/
author: FourCore Internship Task
date: 2025-12-20
tags:
    - attack.discovery
    - attack.t1135
    - attack.t1046
logsource:
    product: windows
    category: file_event

detection:
    selection:
        TargetFilename|endswith: '\delete.me'
        TargetFilename|contains: '\\'  
    filter_legitimate_backup:
       
        Image|contains:
            - 'backup'
            - 'veeam'
    condition: selection and not filter_legitimate_backup
    
fields:
    - TargetFilename
    - Image
    - User
    - ComputerName
falsepositives:
    - Legitimate SoftPerfect NetScan usage by IT administrators for authorized network audits
    - Custom scripts that create test files on shares to verify write access
    - Some backup or monitoring agents that perform share writability checks
level: medium
