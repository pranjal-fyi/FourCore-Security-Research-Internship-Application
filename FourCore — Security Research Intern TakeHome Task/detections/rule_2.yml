title: Security Policy Export via Secedit for Offline Review
id: 7bc14d93-2e81-4f09-a872-3ca51f0be80d
status: experimental
description: >
    Detects the use of secedit.exe to export local security policy configuration to a
    file (/export /cfg), followed by the output file being opened in a text editor
    such as Notepad. This pattern was observed during the Lynx ransomware intrusion
    where the threat actor exported system security policies to secpol.cfg and reviewed
    the contents in Notepad as part of pre-ransomware reconnaissance on day eight.
    While secedit is a legitimate Windows binary, its use for offline policy export and
    manual review is atypical in normal environments and warrants investigation.
references:
    - https://thedfirreport.com/2025/12/17/cats-got-your-files-lynx-ransomware/
    - https://lolbas-project.github.io/lolbas/Binaries/Secedit/
author: FourCore Internship Task
date: 2025-12-20
tags:
    - attack.discovery
    - attack.t1082
    - attack.t1518
    - attack.defense_evasion
    - attack.t1218
logsource:
    product: windows
    category: process_creation
detection:
    selection_secedit:
        Image|endswith: '\secedit.exe'
        CommandLine|contains|all:
            - '/export'
            - '/cfg'
    condition: selection_secedit
fields:
    - Image
    - CommandLine
    - User
    - ParentImage
    - ParentCommandLine
    - ComputerName
falsepositives:
    - Legitimate security hardening scripts or Group Policy auditing tools that use secedit for baseline comparisons
    - System administrators performing compliance audits or security assessments
    - Automated configuration management tools (Ansible, SCCM, etc.) that export security policies as part of drift detection
level: medium
